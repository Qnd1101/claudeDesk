name: CI (Gate A)

# 게이트 A — 03_DEV_KICKOFF.md §9.2.
# 사람 리뷰어 부재를 대체하는 기계 강제 게이트.
# Rust 코드(Cargo.toml)가 생기기 전에는 cargo 스텝을 graceful no-op 처리하고,
# 시크릿 스캔(gitleaks)은 상시 수행한다.

on:
  push:
    branches: [develop, verify, "feature/**"]
  pull_request:
    branches: [develop, verify, main]

permissions:
  contents: read
  pull-requests: write   # gitleaks-action이 PR 스캔 시 API 접근(요약/코멘트)에 필요

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret & session-content scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # PR 스캔에 필수(gitleaks-action v2)
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  rust-gate:
    name: fmt / clippy / test / build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Detect Rust project
        id: detect
        shell: bash
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cargo=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cargo.toml 없음 — Rust 게이트 스킵(no-op). M0(T0.1) 이후 활성화."
          fi

      - name: Install Rust toolchain
        if: steps.detect.outputs.has_cargo == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo fmt --all -- --check

      - name: cargo clippy -D warnings
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test (units + fixtures + 원본 SHA 불변)
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo test --all --all-features

      - name: cargo build (release)
        if: steps.detect.outputs.has_cargo == 'true'
        run: cargo build --release
